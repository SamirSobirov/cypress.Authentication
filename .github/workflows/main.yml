name: AutoTest Authentication

on:
  schedule:
    - cron: '0 */5 * * *' 
  workflow_dispatch:
    inputs:
      user_chat_id:
        description: 'ID чата для личного ответа'
        required: false
        default: ''

jobs:
  cypress-run:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cypress run
        uses: cypress-io/github-action@v6
        with:
          # ВНИМАНИЕ: Проверь, чтобы путь к файлу теста авторизации был правильным!
          spec: cypress/e2e/monitoring/registration.cy.js 
          browser: chrome
        env:
          CYPRESS_LOGIN_EMAIL: ${{ secrets.LOGIN_EMAIL }}
          CYPRESS_LOGIN_PASSWORD: ${{ secrets.LOGIN_PASSWORD }}

      - name: Parse Diagnostic Data
        if: always()
        run: |
          # Читаем HTTP статус из файла, который создал Cypress
          if [ -f auth_api_status.txt ]; then
            API_STATUS=$(cat auth_api_status.txt | tr -d '[:space:]')
          else
            API_STATUS="UNKNOWN"
          fi

          # Формируем статус для Telegram в зависимости от кода ответа сервера
          if [[ "$API_STATUS" == "UNKNOWN" ]]; then
            echo "MSG_STATUS=❌ UI Error / Crash" >> $GITHUB_ENV
          elif [[ "$API_STATUS" -ge 400 ]]; then
            echo "MSG_STATUS=🆘 Error (HTTP $API_STATUS)" >> $GITHUB_ENV
          elif [[ "$API_STATUS" -ge 200 && "$API_STATUS" -lt 400 ]]; then
            echo "MSG_STATUS=✅ Success" >> $GITHUB_ENV
          else
            echo "MSG_STATUS=❌ Unknown Failure" >> $GITHUB_ENV
          fi

      - name: Upload Cypress Screenshots
        uses: actions/upload-artifact@v4
        if: failure() || always()
        with:
          name: cypress-screenshots
          path: cypress/screenshots/
          if-no-files-found: ignore

      - name: Send Telegram Notification
        if: always()
        uses: appleboy/telegram-action@master
        with:
          to: >-
            ${{ (github.event.inputs.user_chat_id != '') && 
            github.event.inputs.user_chat_id || 
            secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_TOKEN }} 
          format: markdown
          message: |
            ${{ github.event_name == 'schedule' && '📢 **Hourly Monitoring**' || '👤 **Manual Testing**' }}
            
            🔐 **Authentication Result**
            **Status:** ${{ job.status == 'success' && '✅ Success' || '❌ Failed' }}
            **Time:** ${{ github.event_name == 'schedule' && 'Hourly ⏰' || 'Manual 🔘' }}